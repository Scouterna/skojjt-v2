name: Build & Test

on:
  push:
    branches: [ '**' ]
    tags-ignore: [ 'v*' ]  # Tag pushes are handled by release.yml
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: skojjt
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: skojjt_test
          POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C.UTF-8 --lc-ctype=C.UTF-8"
          LANG: C.UTF-8
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skojjt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=skojjt_test;Username=skojjt;Password=test_password;Client Encoding=UTF8"
