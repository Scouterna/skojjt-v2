name: Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_WEBAPP_NAME: skojjt
  PROJECT_PATH: src/Skojjt.Web/Skojjt.Web.csproj

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ./publish

      - name: Verify publish output
        run: |
          echo "=== runtimeconfig.json files ==="
          find ./publish -name '*.runtimeconfig.json'
          echo "=== Checking for Skojjt.Web.dll ==="
          ls -la ./publish/Skojjt.Web.dll
          RUNTIMECONFIG_COUNT=$(find ./publish -name '*.runtimeconfig.json' | wc -l)
          if [ "$RUNTIMECONFIG_COUNT" -ne 1 ]; then
            echo "::warning::Found $RUNTIMECONFIG_COUNT runtimeconfig.json files instead of 1"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish

      - name: Wait for application to restart
        run: |
          echo "Waiting for application to restart..."
          sleep 15
          curl --fail --retry 10 --retry-delay 10 --retry-all-errors \
            https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/healthz \
            && echo "Application is healthy" \
            || echo "Health check did not return 200, check Azure logs"
